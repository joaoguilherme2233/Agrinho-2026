<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Simulador de Precisão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-green-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">AGRO<span class="text-green-300">SUSTENTÁVEL</span></h1>
            <span class="bg-green-600 px-3 py-1 rounded-full text-sm font-medium">Agrinho 2026</span>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <section class="text-center mb-10">
            <h2 class="text-4xl font-extrabold text-gray-900 mb-2">Simulador de Agricultura de Precisão</h2>
            <p class="text-gray-600">Equilíbrio entre Produção e Meio Ambiente</p>
        </section>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 h-fit">
                <h3 class="text-xl font-bold mb-4">⚙️ Controle do Manejo</h3>
                <div class="space-y-4">
                    <button id="btn-tradicional" class="w-full bg-gray-200 hover:bg-gray-300 py-3 rounded-xl font-bold transition">Modo Convencional</button>
                    <button id="btn-precisao" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold transition shadow-lg">Modo Precisão (AP)</button>
                    <button id="btn-reset" class="w-full text-gray-400 text-sm underline mt-4">Reiniciar Fazenda</button>
                    
                    <div class="p-4 bg-blue-50 rounded-lg mt-6">
                        <p id="status-msg" class="text-sm text-blue-800 italic text-center">Escolha um modo para começar.</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-xl border border-gray-100 lg:col-span-2">
                <div id="grid-fazenda" class="farm-grid">
                    </div>
                <div class="mt-4 flex justify-center gap-4 text-xs">
                    <span class="flex items-center"><span class="w-3 h-3 bg-[#d2b48c] mr-1 rounded"></span> Solo Pobre</span>
                    <span class="flex items-center"><span class="w-3 h-3 bg-[#5d4037] mr-1 rounded"></span> Solo Fértil</span>
                    <span class="flex items-center"><span class="w-3 h-3 bg-[#2e7d32] mr-1 rounded"></span> Cultivo Saudável</span>
                </div>
            </div>
        </div>

        <section class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-yellow-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Produção Estimada</p>
                <p id="val-producao" class="text-3xl font-black">0 <span class="text-sm">sc/ha</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-red-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Gasto com Insumos</p>
                <p id="val-insumos" class="text-3xl font-black text-red-600">R$ 0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-green-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Índice Sustentável</p>
                <p id="val-sustentavel" class="text-3xl font-black text-green-600">0%</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
